# Ave HTTP Authentication System Configuration Example
#
# This file demonstrates how to configure the new database-backed authentication system.
# Copy this to your config file and adjust as needed.

[auth]
# Enable or disable the authentication system
enabled = true

# Path to the SQLite database file
# The database will be created automatically if it doesn't exist
database_path = "./data/auth.db"

# Superadmin configuration (only used for initial bootstrap)
# After the first run, this user will be created and you can log in with these credentials
[auth.superadmin]
username = "admin"
password = "change_this_secure_password_immediately"

# Session configuration
[auth.session]
# API key time-to-live in seconds (default: 30 days)
api_key_ttl_seconds = 2592000

# Whether to log all API requests to the audit log
# Warning: This can generate a lot of data
log_all_requests = false

# Password policy configuration
[auth.password_policy]
# Minimum password length
min_length = 12

# Require at least one uppercase letter
require_uppercase = true

# Require at least one lowercase letter
require_lowercase = true

# Require at least one digit
require_digit = true

# Require at least one special character (!@#$%^&*()_+-=[]{}|;:,.<>?)
require_special = true

# Account lockout configuration
[auth.account_lockout]
# Enable account lockout after failed login attempts
enabled = true

# Number of failed attempts before lockout
max_attempts = 5

# Lockout duration in seconds (default: 15 minutes)
lockout_duration_seconds = 900

# Rate limiting configuration
[auth.rate_limit]
# Enable rate limiting
enabled = true

# Maximum requests per window
max_requests = 100

# Time window in seconds
window_seconds = 60

# How often to clean up old rate limit entries (in seconds)
cleanup_interval_seconds = 3600

# Audit log configuration
[auth.audit]
# Enable audit logging
enabled = true

# Retention period in days (0 = keep forever)
retention_days = 90

# Security configuration
[auth.security]
# Require API keys to have an expiration date
require_key_expiration = false

# Allow multiple API keys per user
allow_multiple_keys = true

# Example of how this would integrate with existing Ave Bridge config:
#
# [ave_config]
# # ... your existing Ave configuration ...
#
# [auth]
# # ... authentication configuration from above ...
#
